services:
  arbour:
    image: ${ARBOUR_IMAGE:-ghcr.io/turtleful/arbour:self-managed-arbour}
    restart: unless-stopped
    ports:
      # Host Port : Container Port
      - 5001:5001
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./data:/app/data

      # Stacks Directory
      # Change the left side to wherever you want to store stacks on your host.
      # The right side (/opt/stacks) is the container path — do not change it.
      # ⚠️ Bind mounts inside your stacks MUST use absolute host paths (e.g. /docker/mystacks).
      #    Relative paths like ./data will not work — Docker resolves them against the container
      #    path, not the host path, so the daemon cannot find the files.
      - /opt/stacks:/opt/stacks
    environment:
      # Set timezone
      - TZ=${TZ:-Europe/Berlin}
      # Internal container path for stacks — must match the right side of the volume mount above.
      - ARBOUR_STACKS_DIR=/opt/stacks
