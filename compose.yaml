services:
  arbour:
    # Pin to a specific version (e.g. :0.2.0) for production. :latest tracks the newest release.
    image: ghcr.io/turtleful/arbour:latest
    restart: unless-stopped
    ports:
      # Host Port : Container Port
      - 5001:5001
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./data:/app/data

      # If you want to use private registries, you need to share the auth file with Arbour:
      # - /root/.docker/:/root/.docker

      # Stacks Directory
      # ⚠️ READ IT CAREFULLY. If you did it wrong, your data could end up writing into a WRONG PATH.
      # ⚠️ 1. FULL path only. No relative path (MUST)
      # ⚠️ 2. Left Stacks Path === Right Stacks Path (MUST)
      - /opt/stacks:/opt/stacks
    environment:
      # Set timezone, if TZ ist not set on your host, set a specific timezone e.g. Europe/Berlin
      - TZ=${TZ}
      # Tell Arbour where is your stacks directory
      - ARBOUR_STACKS_DIR=/opt/stacks
