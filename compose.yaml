services:
  arbour:
    image: ghcr.io/turtleful/arbour:latest
    restart: unless-stopped
    ports:
      # Host Port : Container Port
      - 5001:5001
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./data:/app/data
      # Stacks Directory — mount any host path to /opt/stacks inside the container
      - /opt/stacks:/opt/stacks
    environment:
      # Set timezone, if TZ is not set on your host, set a specific timezone e.g. Europe/Berlin
      - TZ=${TZ}
